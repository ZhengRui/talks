name: quote
params:
  quote: { type: string, required: true }
  attribution: { type: string }
style:
  fontSize: { type: number, default: 36 }
  attributionFontSize: { type: number, default: 26 }

{% import "scene/blocks.njk" as blocks %}

mode: scene
presets:
  quoteMark:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.accent"
      textAlign: center
      lineHeight: 1
{{ blocks.body_text_preset("quoteText", "center", "theme.text", 1.6, 400, "italic") | indent(2, true) }}
{{ blocks.body_text_preset("quoteAttribution", "center", "theme.textMuted", 1.5) | indent(2, true) }}
children:
  - kind: group
    id: quote-stack
    frame: { x: 0, y: 0, w: 1920, h: 1080 }
    layout:
      type: stack
      gap: 24
      align: center
      justify: center
      padding: [0, 160, 0, 160]
    children:
      - kind: text
        id: quote-mark
        preset: quoteMark
        frame: { h: 120 }
        text: "“"
        style:
          fontSize: 120
        entrance: { type: fade-in, delay: 0, duration: 600 }
      - kind: text
        id: quote-text
        preset: quoteText
        text: "{{ quote | yaml_string }}"
        style:
          fontSize: {{ style.fontSize }}
        entrance: { type: scale-up, delay: 150, duration: 600 }
      {% if attribution %}
      - kind: text
        id: quote-attribution
        preset: quoteAttribution
        text: "{{ ('— ' ~ attribution) | yaml_string }}"
        style:
          fontSize: {{ style.attributionFontSize }}
        entrance: { type: fade-up, delay: 400, duration: 600 }
      {% endif %}
