name: image-text
params:
  title: { type: string, required: true }
  image: { type: string, required: true }
  body: { type: string }
  bullets: { type: "string[]" }
  imagePosition: { type: string }
style:
  titleSize: { type: number, default: 48 }
  bodySize: { type: number, default: 28 }

base: split-compose
{% if imagePosition == "right" %}
left:
  gap: 0
  padding: [60, 20, 60, 160]
  children:
    - type: spacer
      height: 210
    - type: heading
      text: "{{ title }}"
      textAlign: left
      fontSize: {{ style.titleSize }}
      animationType: fade-up
      animationDelay: 0
    - type: divider
      variant: gradient
      width: 80
      marginTop: 16
      marginBottom: 250
      animationType: fade-up
      animationDelay: 100
    {% if body %}
    - type: body
      text: "{{ body }}"
      fontSize: {{ style.bodySize }}
      lineHeight: 1.7
      marginBottom: 44
      animationType: slide-left
      animationDelay: 300
    {% endif %}
    {% if bullets %}
    - type: bullets
      items: {{ bullets }}
      variant: list
      fontSize: 26
      animationType: fade-up
      animationDelay: 400
    {% endif %}
right:
  padding: [0, 160, 0, 20]
  children:
    - type: image
      src: "{{ image }}"
      height: 1080
      objectFit: cover
      animationType: slide-right
      animationDelay: 200
{% else %}
left:
  padding: [0, 20, 0, 160]
  children:
    - type: image
      src: "{{ image }}"
      height: 1080
      objectFit: cover
      animationType: slide-left
      animationDelay: 200
right:
  background: theme.bg
  gap: 0
  padding: [60, 160, 60, 20]
  children:
    - type: spacer
      height: 210
    - type: heading
      text: "{{ title }}"
      textAlign: left
      fontSize: {{ style.titleSize }}
      animationType: fade-up
      animationDelay: 0
    - type: divider
      variant: gradient
      width: 80
      marginTop: 16
      marginBottom: 250
      animationType: fade-up
      animationDelay: 100
    {% if body %}
    - type: body
      text: "{{ body }}"
      fontSize: {{ style.bodySize }}
      lineHeight: 1.7
      marginBottom: 44
      animationType: slide-right
      animationDelay: 300
    {% endif %}
    {% if bullets %}
    - type: bullets
      items: {{ bullets }}
      variant: list
      fontSize: 26
      animationType: fade-up
      animationDelay: 400
    {% endif %}
{% endif %}
