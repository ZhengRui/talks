name: code
params:
  code: { type: string, required: true }
  title: { type: string }
  language: { type: string }
style:
  titleSize: { type: number, default: 56 }
  codeFontSize: { type: number, default: 24 }

{% import "scene/blocks.njk" as blocks %}

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set codeHeight = code | code_height(style.codeFontSize, 32, 1.6) %}

mode: scene
presets:
{{ blocks.header_presets("centeredTitle", "divider") | indent(2, true) }}
children:
  {% if title %}
{{ blocks.section_title("code", 160, 60, 1600, title, style.titleSize, 80, 16, "centeredTitle", "divider", 0, 100, 600) | indent(2, true) }}
  {% endif %}
  - kind: ir
    id: code-block
    frame: { x: 160, y: {{ contentTop }}, w: 1600, h: {{ codeHeight }} }
    entrance: { type: fade-up, delay: {{ 200 if title else 0 }}, duration: 600 }
    element:
{{ blocks.code_element("code-block-element", 1600, codeHeight, code, language, style.codeFontSize, 32, 12) | indent(6, true) }}
