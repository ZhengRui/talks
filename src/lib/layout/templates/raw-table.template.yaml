name: raw-table
params:
  title: { type: string }
  headers: { type: array, required: true }
  rows: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  fontSize: { type: number, default: 26 }
  headerFontSize: { type: number, default: 26 }
  rowH: { type: number, default: 68 }
  headerH: { type: number, default: 72 }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  {% set pw = 1600 %}
  {% set colCount = headers.length %}
  {% set colW = pw / colCount %}
  {% set tableH = style.headerH + rows.length * style.rowH %}
  - type: raw
    height: {{ tableH }}
    elements:
      - kind: group
        id: raw-tbl-group
        rect: { x: 0, y: 0, w: {{ pw }}, h: {{ tableH }} }
        style: { borderRadius: 12 }
        clipContent: true
        animation: { type: fade-in, delay: 200, duration: 500 }
        children:
          # Header row background
          - kind: shape
            id: raw-tbl-header-bg
            rect: { x: 0, y: 0, w: {{ pw }}, h: {{ style.headerH }} }
            shape: rect
            style: { fill: "theme.accent" }
          # Header cell texts
          {% for h in headers %}
          - kind: text
            id: "raw-tbl-hdr-{{ loop.index0 }}"
            rect: { x: {{ loop.index0 * colW + 24 }}, y: 0, w: {{ colW - 48 }}, h: {{ style.headerH }} }
            text: "{{ h }}"
            style:
              fontFamily: "theme.fontHeading"
              fontSize: {{ style.headerFontSize }}
              fontWeight: 600
              color: "theme.bg"
              lineHeight: 1.4
              textAlign: left
              verticalAlign: middle
          {% endfor %}
          # Data rows
          {% for row in rows %}
          {% set rowIdx = loop.index0 %}
          {% set rowY = style.headerH + rowIdx * style.rowH %}
          # Row background (alternating — even=altBg, odd=cardBg to match table renderer)
          - kind: shape
            id: "raw-tbl-row-bg-{{ rowIdx }}"
            rect: { x: 0, y: {{ rowY }}, w: {{ pw }}, h: {{ style.rowH }} }
            shape: rect
            {% if rowIdx % 2 == 0 %}
            style: { fill: "theme.bgTertiary" }
            {% else %}
            style: { fill: "theme.cardBg" }
            {% endif %}
          # Row border
          - kind: shape
            id: "raw-tbl-row-border-{{ rowIdx }}"
            rect: { x: 0, y: {{ rowY + style.rowH - 1 }}, w: {{ pw }}, h: 1 }
            shape: rect
            style: { fill: "theme.border.color" }
          # Cell texts
          {% for cell in row %}
          - kind: text
            id: "raw-tbl-cell-{{ rowIdx }}-{{ loop.index0 }}"
            rect: { x: {{ loop.index0 * colW + 24 }}, y: {{ rowY }}, w: {{ colW - 48 }}, h: {{ style.rowH }} }
            text: "{{ cell }}"
            style:
              fontFamily: "theme.fontBody"
              fontSize: {{ style.fontSize }}
              fontWeight: 400
              color: "theme.text"
              lineHeight: 1.4
              textAlign: left
              verticalAlign: middle
          {% endfor %}
          {% endfor %}
