name: top-bottom-v2
params:
  title: { type: string }
  top: { type: string, required: true }
  bottom: { type: string, required: true }
style:
  titleSize: { type: number, default: 56 }
  bodySize: { type: number, default: 30 }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: top
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      {% endif %}
      - type: box
        fill: true
        padding: 32
        entranceType: fade-up
        children:
          - type: body
            text: "{{ top }}"
            fontSize: {{ style.bodySize }}
      - type: divider
        variant: gradient
        width: 200
        align: center
        margin: [28, 0, 28, 0]
      - type: box
        fill: true
        padding: 32
        entranceType: fade-up
        children:
          - type: body
            text: "{{ bottom }}"
            fontSize: {{ style.bodySize }}
