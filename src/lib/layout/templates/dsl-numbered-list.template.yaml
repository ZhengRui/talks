name: dsl-numbered-list
params:
  title: { type: string, required: true }
  items: { type: "string[]", required: true }
style:
  titleSize: { type: number, default: 56 }

base: full-compose
children:
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
  - type: divider
    variant: gradient
    width: 80
    marginTop: 16
    marginBottom: 40
  - type: bullets
    ordered: true
    variant: plain
    items: {{ items }}
