name: end
params:
  title: { type: string }
  subtitle: { type: string }

mode: scene
presets:
  endTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  endSubtitle:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.textMuted"
      textAlign: center
      lineHeight: 1.35
  divider:
    style:
      fill: "theme.accent"
children:
  - kind: text
    id: end-title
    preset: endTitle
    frame:
      x: 240
      y: {{ 360 if subtitle else 470 }}
      w: 1440
    text: "{{ title or 'Thank You' }}"
    style:
      fontSize: 80
  {% if subtitle %}
  - kind: shape
    id: end-divider
    preset: divider
    frame:
      centerX: "@end-title.centerX"
      top: { ref: "@end-title.bottom", offset: 28 }
      w: 120
      h: 4
    shape: rect
  - kind: text
    id: end-subtitle
    preset: endSubtitle
    frame:
      x: 320
      top: { ref: "@end-divider.bottom", offset: 28 }
      w: 1280
    text: "{{ subtitle }}"
    style:
      fontSize: 36
  {% endif %}
