name: end
params:
  title: { type: string }
  subtitle: { type: string }

base: full-compose
verticalAlign: center
children:
  - type: heading
    text: "{{ title or 'Thank You' }}"
    fontSize: 80
    textAlign: center
  {% if subtitle %}
  - type: divider
    variant: gradient
    width: 120
    align: center
  - type: body
    text: "{{ subtitle }}"
    fontSize: 36
    color: theme.textMuted
    textAlign: center
  {% endif %}
