name: timeline
params:
  title: { type: string }
  events: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  - type: timeline
    events: {{ events }}
