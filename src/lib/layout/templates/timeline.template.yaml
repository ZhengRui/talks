name: timeline
params:
  title: { type: string }
  events: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  dotSize: { type: number, default: 16 }

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set pw = 1600 %}
{% set count = events.length if events.length > 0 else 1 %}
{% set lineY = 18 %}
{% set segW = pw / count %}
{% set bodyHeight = 300 %}

mode: scene
presets:
  centeredTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      gradient: "theme.accentGradient"
children:
  {% if title %}
  - kind: text
    id: timeline-title
    preset: centeredTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title | yaml_string }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: timeline-divider
    preset: divider
    frame:
      centerX: "@timeline-title.centerX"
      top: { ref: "@timeline-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: ir
    id: timeline-body
    frame: { x: 160, y: {{ contentTop }}, w: {{ pw }}, h: {{ bodyHeight }} }
    element:
      kind: group
      id: tl-group
      rect: { x: 0, y: 0, w: {{ pw }}, h: {{ bodyHeight }} }
      children:
        - kind: shape
          id: tl-line
          rect: { x: 0, y: {{ lineY - 1 }}, w: {{ pw }}, h: 3 }
          shape: rect
          style: { fill: "theme.border.color" }
          entrance: { type: fade-in, delay: 100, duration: 500 }
        {% for event in events %}
        {% set cx = loop.index0 * segW + segW / 2 %}
        {% set dotX = cx - style.dotSize / 2 %}
        {% set dotY = lineY - style.dotSize / 2 + 1 %}
        {% set delay = 200 + loop.index0 * 150 %}
        {% set textX = loop.index0 * segW + 16 %}
        {% set textW = segW - 32 %}
        {% set dateY = dotY + style.dotSize + 16 %}
        {% set labelY = dateY + 40 %}
        - kind: shape
          id: "tl-ring-{{ loop.index0 }}"
          rect: { x: {{ dotX - 2 }}, y: {{ dotY - 2 }}, w: {{ style.dotSize + 4 }}, h: {{ style.dotSize + 4 }} }
          shape: circle
          style: { fill: "theme.accent" }
          entrance: { type: scale-up, delay: {{ delay }}, duration: 500 }
        - kind: shape
          id: "tl-inner-{{ loop.index0 }}"
          rect: { x: {{ dotX + 1 }}, y: {{ dotY + 1 }}, w: {{ style.dotSize - 2 }}, h: {{ style.dotSize - 2 }} }
          shape: circle
          style: { fill: "theme.bg" }
          entrance: { type: scale-up, delay: {{ delay }}, duration: 500 }
        - kind: shape
          id: "tl-core-{{ loop.index0 }}"
          rect: { x: {{ dotX + 1 }}, y: {{ dotY + 1 }}, w: {{ style.dotSize - 2 }}, h: {{ style.dotSize - 2 }} }
          shape: circle
          style: { fill: "theme.accent" }
          entrance: { type: scale-up, delay: {{ delay }}, duration: 500 }
        - kind: text
          id: "tl-date-{{ loop.index0 }}"
          rect: { x: {{ textX }}, y: {{ dateY }}, w: {{ textW }}, h: 32 }
          text: "{{ event.date | yaml_string }}"
          style:
            fontFamily: "theme.fontBody"
            fontSize: 26
            fontWeight: 700
            color: "theme.accent"
            lineHeight: 1.2
            textAlign: center
          entrance: { type: fade-up, delay: {{ delay + 50 }}, duration: 500 }
        - kind: text
          id: "tl-label-{{ loop.index0 }}"
          rect: { x: {{ textX }}, y: {{ labelY }}, w: {{ textW }}, h: 32 }
          text: "{{ event.label | yaml_string }}"
          style:
            fontFamily: "theme.fontHeading"
            fontSize: 26
            fontWeight: 700
            color: "theme.heading"
            lineHeight: 1.1
            textAlign: center
          entrance: { type: fade-up, delay: {{ delay + 100 }}, duration: 500 }
        {% if event.description %}
        {% set descY = labelY + 40 %}
        - kind: text
          id: "tl-desc-{{ loop.index0 }}"
          rect: { x: {{ textX }}, y: {{ descY }}, w: {{ textW }}, h: 100 }
          text: "{{ event.description | yaml_string }}"
          style:
            fontFamily: "theme.fontBody"
            fontSize: 24
            fontWeight: 400
            color: "theme.textMuted"
            lineHeight: 1.5
            textAlign: center
          entrance: { type: fade-up, delay: {{ delay + 150 }}, duration: 500 }
        {% endif %}
        {% endfor %}
