name: steps
params:
  title: { type: string }
  steps: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  badgeSize: { type: number, default: 48 }
  stepGap: { type: number, default: 24 }

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set pw = 1600 %}
{% set ph = 660 %}
{% set count = steps.length if steps.length > 0 else 1 %}
{% set stepH = (ph - (count - 1) * style.stepGap) / count %}
{% if stepH > 120 %}{% set stepH = 120 %}{% endif %}
{% set connGap = 24 %}
{% set cardX = style.badgeSize + connGap %}
{% set cardW = pw - style.badgeSize - connGap %}
{% set cardPad = 24 %}
{% set bodyHeight = (steps.length * stepH) + ((steps.length - 1) * style.stepGap) if steps.length > 0 else 0 %}

mode: scene
presets:
  centeredTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      gradient: "theme.accentGradient"
children:
  {% if title %}
  - kind: text
    id: steps-title
    preset: centeredTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title | yaml_string }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: steps-divider
    preset: divider
    frame:
      centerX: "@steps-title.centerX"
      top: { ref: "@steps-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: ir
    id: steps-body
    frame: { x: 160, y: {{ contentTop }}, w: {{ pw }}, h: {{ bodyHeight }} }
    element:
      kind: group
      id: st-group
      rect: { x: 0, y: 0, w: {{ pw }}, h: {{ bodyHeight }} }
      children:
        {% for step in steps %}
        {% set y = loop.index0 * (stepH + style.stepGap) %}
        {% set delay = 200 + loop.index0 * 150 %}
        - kind: group
          id: "st-badge-{{ loop.index0 }}"
          rect: { x: 0, y: {{ y + (stepH - style.badgeSize) / 2 }}, w: {{ style.badgeSize }}, h: {{ style.badgeSize }} }
          children:
            - kind: text
              id: "st-badge-{{ loop.index0 }}-num"
              rect: { x: 0, y: 0, w: {{ style.badgeSize }}, h: {{ style.badgeSize }} }
              text: "{{ loop.index }}"
              style:
                fontFamily: "theme.fontBody"
                fontSize: 24
                fontWeight: 700
                color: "theme.bg"
                lineHeight: 1
                textAlign: center
                verticalAlign: middle
          style:
            fill: "theme.accent"
          borderRadius: 100
          entrance: { type: scale-up, delay: {{ delay }}, duration: 500 }
        {% if not loop.last %}
        {% set lineX = style.badgeSize / 2 - 1.5 %}
        {% set lineY = y + (stepH + style.badgeSize) / 2 %}
        {% set lineH = style.stepGap + (stepH - style.badgeSize) %}
        - kind: shape
          id: "st-conn-{{ loop.index0 }}"
          rect: { x: {{ lineX }}, y: {{ lineY }}, w: 3, h: {{ lineH }} }
          shape: rect
          style: { fill: "theme.border.color" }
          entrance: { type: fade-in, delay: {{ delay + 100 }}, duration: 500 }
        {% endif %}
        - kind: group
          id: "st-card-{{ loop.index0 }}"
          rect: { x: {{ cardX }}, y: {{ y }}, w: {{ cardW }}, h: {{ stepH }} }
          children:
            - kind: text
              id: "st-label-{{ loop.index0 }}"
              rect: { x: {{ cardPad }}, y: {{ cardPad }}, w: {{ cardW - cardPad * 2 }}, h: 36 }
              text: "{{ step.label | yaml_string }}"
              style:
                fontFamily: "theme.fontHeading"
                fontSize: 30
                fontWeight: 700
                color: "theme.heading"
                lineHeight: 1.1
                textAlign: left
            {% if step.description %}
            - kind: text
              id: "st-desc-{{ loop.index0 }}"
              rect: { x: {{ cardPad }}, y: {{ cardPad + 40 }}, w: {{ cardW - cardPad * 2 }}, h: 32 }
              text: "{{ step.description | yaml_string }}"
              style:
                fontFamily: "theme.fontBody"
                fontSize: 24
                fontWeight: 400
                color: "theme.textMuted"
                lineHeight: 1.5
                textAlign: left
            {% endif %}
          style:
            fill: "theme.cardBg"
          borderRadius: 16
          border: { width: 1, color: "theme.border.color" }
          clipContent: true
          entrance: { type: fade-up, delay: {{ delay + 50 }}, duration: 500 }
        {% endfor %}
