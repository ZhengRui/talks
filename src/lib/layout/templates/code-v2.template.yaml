name: code-v2
params:
  code: { type: string, required: true }
  title: { type: string }
  language: { type: string }
style:
  titleSize: { type: number, default: 56 }
  codeFontSize: { type: number, default: 24 }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: top
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      {% endif %}
      - type: code
        code: {{ code | tojson }}
        fontSize: {{ style.codeFontSize }}
        {% if language %}
        language: {{ language }}
        {% endif %}
