name: sidebar
params:
  title: { type: string }
  sidebar: { type: string, required: true }
  main: { type: string, required: true }
  sidebarPosition: { type: string }
style:
  titleSize: { type: number, default: 48 }
  sidebarSize: { type: number, default: 28 }
  mainSize: { type: number, default: 30 }

mode: scene
presets:
  sidebarTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: left
      lineHeight: 1.15
  mainBody:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: left
      lineHeight: 1.45
  sidebarBody:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: left
      lineHeight: 1.45
  sidebarPanel:
    borderRadius: 18
    style:
      fill: "theme.bgSecondary"
    border:
      width: 1
      color: "theme.border.color"
children:
  - kind: group
    id: sidebar-layout
    frame: { x: 160, y: 140, w: 1600, h: 800 }
    layout:
      type: row
      gap: 40
      tracks: {{ '["70%", "30%"]' if sidebarPosition == "right" else '["30%", "70%"]' }}
      align: stretch
    children:
      {% if sidebarPosition == "right" %}
      - kind: group
        id: sidebar-main-column
        children:
          {% if title %}
          - kind: text
            id: sidebar-title
            preset: sidebarTitle
            frame: { left: 0, top: 0, right: 0 }
            text: "{{ title | yaml_string }}"
            style:
              fontSize: {{ style.titleSize }}
            entrance: { type: fade-up, delay: 0, duration: 600 }
          {% endif %}
          - kind: text
            id: sidebar-main-body
            preset: mainBody
            frame:
              left: 0
              top: {{ 88 if title else 0 }}
              right: 0
            text: "{{ main | yaml_string }}"
            style:
              fontSize: {{ style.mainSize }}
            entrance: { type: slide-left, delay: 200, duration: 600 }
      - kind: group
        id: sidebar-side-column
        children:
          - kind: group
            id: sidebar-panel
            preset: sidebarPanel
            frame:
              left: 0
              top: {{ 76 if title else 0 }}
              right: 0
              bottom: 0
            entrance: { type: slide-right, delay: 200, duration: 600 }
            children:
              - kind: text
                id: sidebar-panel-body
                preset: sidebarBody
                frame: { left: 40, top: 40, right: 40 }
                text: "{{ sidebar | yaml_string }}"
                style:
                  fontSize: {{ style.sidebarSize }}
      {% else %}
      - kind: group
        id: sidebar-side-column
        children:
          - kind: group
            id: sidebar-panel
            preset: sidebarPanel
            frame:
              left: 0
              top: {{ 76 if title else 0 }}
              right: 0
              bottom: 0
            entrance: { type: slide-left, delay: 200, duration: 600 }
            children:
              - kind: text
                id: sidebar-panel-body
                preset: sidebarBody
                frame: { left: 40, top: 40, right: 40 }
                text: "{{ sidebar | yaml_string }}"
                style:
                  fontSize: {{ style.sidebarSize }}
      - kind: group
        id: sidebar-main-column
        children:
          {% if title %}
          - kind: text
            id: sidebar-title
            preset: sidebarTitle
            frame: { left: 0, top: 0, right: 0 }
            text: "{{ title | yaml_string }}"
            style:
              fontSize: {{ style.titleSize }}
            entrance: { type: fade-up, delay: 0, duration: 600 }
          {% endif %}
          - kind: text
            id: sidebar-main-body
            preset: mainBody
            frame:
              left: 0
              top: {{ 88 if title else 0 }}
              right: 0
            text: "{{ main | yaml_string }}"
            style:
              fontSize: {{ style.mainSize }}
            entrance: { type: slide-right, delay: 200, duration: 600 }
      {% endif %}
