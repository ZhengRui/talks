name: sidebar
params:
  title: { type: string }
  sidebar: { type: string, required: true }
  main: { type: string, required: true }
  sidebarPosition: { type: string }
style:
  titleSize: { type: number, default: 48 }
  sidebarSize: { type: number, default: 28 }
  mainSize: { type: number, default: 30 }

{% set sideWidth = 480 %}
{% set mainWidth = 1080 %}
{% set layoutHeight = 960 %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, mainWidth, 700) if title else 0 %}
{% set sidebarBodyHeight = sidebar | text_height(style.sidebarSize, 1.6, 400, 400) %}
{% set mainBodyHeight = main | text_height(style.mainSize, 1.6, mainWidth, 400) %}
{% set mainColumnHeight = mainBodyHeight if not title else (titleHeight + 16 + 32 + 16 + mainBodyHeight) %}

mode: scene
presets:
  sidebarTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: left
      lineHeight: 1.15
  mainBody:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: left
      lineHeight: 1.6
  sidebarBody:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: left
      lineHeight: 1.6
  sidebarPanel:
    borderRadius: 12
    style:
      fill: "theme.bgSecondary"
    clipContent: true
children:
  - kind: group
    id: sidebar-layout
    frame: { x: 160, y: 60, w: 1600, h: 960 }
    layout:
      type: row
      gap: 40
      tracks: {{ "[1080, 480]" if sidebarPosition == "right" else "[480, 1080]" }}
      align: start
    children:
      {% if sidebarPosition == "right" %}
      - kind: group
        id: sidebar-main-column
        frame: { h: {{ mainColumnHeight }} }
        layout:
          type: stack
          gap: 16
        children:
          {% if title %}
          - kind: text
            id: sidebar-title
            preset: sidebarTitle
            frame: { w: {{ mainWidth }}, h: {{ titleHeight }} }
            text: "{{ title | yaml_string }}"
            style:
              fontSize: {{ style.titleSize }}
            entrance: { type: fade-up, delay: 0, duration: 600 }
          - kind: group
            id: sidebar-title-gap
            frame: { h: 32 }
            children: []
          {% endif %}
          - kind: text
            id: sidebar-main-body
            preset: mainBody
            frame: { w: {{ mainWidth }}, h: {{ mainBodyHeight }} }
            text: "{{ main | yaml_string }}"
            style:
              fontSize: {{ style.mainSize }}
            entrance: { type: slide-left, delay: 200, duration: 600 }
      - kind: group
        id: sidebar-side-column
        frame: { h: 960 }
        layout:
          type: stack
          gap: 16
        children:
          {% if title %}
          - kind: group
            id: sidebar-panel-offset
            frame: { h: 76 }
            children: []
          {% endif %}
          - kind: group
            id: sidebar-panel
            preset: sidebarPanel
            frame: { w: {{ sideWidth }}, h: {{ 868 if title else 960 }} }
            entrance: { type: slide-right, delay: 200, duration: 600 }
            children:
              - kind: text
                id: sidebar-panel-body
                preset: sidebarBody
                frame: { left: 40, top: 40, right: 40, h: {{ sidebarBodyHeight }} }
                text: "{{ sidebar | yaml_string }}"
                style:
                  fontSize: {{ style.sidebarSize }}
      {% else %}
      - kind: group
        id: sidebar-side-column
        frame: { h: 960 }
        layout:
          type: stack
          gap: 16
        children:
          {% if title %}
          - kind: group
            id: sidebar-panel-offset
            frame: { h: 76 }
            children: []
          {% endif %}
          - kind: group
            id: sidebar-panel
            preset: sidebarPanel
            frame: { w: {{ sideWidth }}, h: {{ 868 if title else 960 }} }
            entrance: { type: slide-left, delay: 200, duration: 600 }
            children:
              - kind: text
                id: sidebar-panel-body
                preset: sidebarBody
                frame: { left: 40, top: 40, right: 40, h: {{ sidebarBodyHeight }} }
                text: "{{ sidebar | yaml_string }}"
                style:
                  fontSize: {{ style.sidebarSize }}
      - kind: group
        id: sidebar-main-column
        frame: { h: {{ mainColumnHeight }} }
        layout:
          type: stack
          gap: 16
        children:
          {% if title %}
          - kind: text
            id: sidebar-title
            preset: sidebarTitle
            frame: { w: {{ mainWidth }}, h: {{ titleHeight }} }
            text: "{{ title | yaml_string }}"
            style:
              fontSize: {{ style.titleSize }}
            entrance: { type: fade-up, delay: 0, duration: 600 }
          - kind: group
            id: sidebar-title-gap
            frame: { h: 32 }
            children: []
          {% endif %}
          - kind: text
            id: sidebar-main-body
            preset: mainBody
            frame: { w: {{ mainWidth }}, h: {{ mainBodyHeight }} }
            text: "{{ main | yaml_string }}"
            style:
              fontSize: {{ style.mainSize }}
            entrance: { type: slide-right, delay: 200, duration: 600 }
      {% endif %}
