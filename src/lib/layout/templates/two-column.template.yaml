name: two-column
params:
  title: { type: string }
  left: { type: string, required: true }
  right: { type: string, required: true }
  verticalAlign: { type: string }
style:
  titleSize: { type: number, default: 56 }
  bodySize: { type: number, default: 30 }
  cardHeight: { type: number }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: {{ verticalAlign or "top" }}
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      {% endif %}
      - type: columns
        gap: 32
        equalHeight: true
        children:
          - type: box
            padding: 32
            {% if style.cardHeight %}
            height: {{ style.cardHeight }}
            {% endif %}
            entranceType: slide-left
            children:
              - type: body
                text: "{{ left }}"
                fontSize: {{ style.bodySize }}
              - type: spacer
                height: 8
          - type: box
            padding: 32
            {% if style.cardHeight %}
            height: {{ style.cardHeight }}
            {% endif %}
            entranceType: slide-right
            children:
              - type: body
                text: "{{ right }}"
                fontSize: {{ style.bodySize }}
              - type: spacer
                height: 8
