name: profile
params:
  name: { type: string, required: true }
  title: { type: string }
  image: { type: string }
  bio: { type: string }
style:
  nameSize: { type: number, default: 48 }
  titleSize: { type: number, default: 32 }
  bioSize: { type: number, default: 26 }
  bioWidth: { type: number, default: 700 }
  avatarSize: { type: number, default: 200 }

base: full-compose
verticalAlign: center
children:
  {% if image %}
  - type: image
    src: "{{ image }}"
    height: {{ style.avatarSize }}
    objectFit: cover
    clipCircle: true
    entranceType: scale-up
    entranceDelay: 0
  {% endif %}
  - type: heading
    text: "{{ name }}"
    fontSize: {{ style.nameSize }}
    textAlign: center
    entranceType: fade-up
    entranceDelay: 200
  {% if title %}
  - type: text
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
    color: theme.accent
    lineHeight: 1.3
    marginTop: 8
    entranceType: fade-up
    entranceDelay: 300
  {% endif %}
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 16
    entranceType: fade-up
    entranceDelay: 350
  {% if bio %}
  - type: text
    text: "{{ bio }}"
    fontSize: {{ style.bioSize }}
    textAlign: center
    color: theme.textMuted
    lineHeight: 1.5
    maxWidth: {{ style.bioWidth }}
    entranceType: fade-up
    entranceDelay: 400
  {% endif %}
