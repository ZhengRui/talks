name: profile
params:
  name: { type: string, required: true }
  title: { type: string }
  image: { type: string }
  bio: { type: string }
style:
  nameSize: { type: number, default: 48 }
  titleSize: { type: number, default: 32 }
  bioSize: { type: number, default: 26 }
  bioWidth: { type: number, default: 700 }
  avatarSize: { type: number, default: 200 }

mode: scene
presets:
  profileName:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  profileTitle:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.accent"
      textAlign: center
      lineHeight: 1.3
  profileBio:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.textMuted"
      textAlign: center
      lineHeight: 1.5
  divider:
    style:
      fill: "theme.accent"
children:
  {% if image %}
  - kind: image
    id: profile-avatar
    frame:
      centerX: 960
      y: 180
      w: {{ style.avatarSize }}
      h: {{ style.avatarSize }}
    src: "{{ image }}"
    objectFit: cover
    clipCircle: true
    entrance: { type: scale-up, delay: 0, duration: 600 }
  {% endif %}
  - kind: text
    id: profile-name
    preset: profileName
    frame:
      x: 260
      y: {{ 408 if image else 360 }}
      w: 1400
    text: "{{ name }}"
    style:
      fontSize: {{ style.nameSize }}
    entrance: { type: fade-up, delay: 200, duration: 600 }
  {% if title %}
  - kind: text
    id: profile-title
    preset: profileTitle
    frame:
      x: 320
      top: { ref: "@profile-name.bottom", offset: 8 }
      w: 1280
    text: "{{ title }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 300, duration: 600 }
  {% endif %}
  - kind: shape
    id: profile-divider
    preset: divider
    frame:
      centerX: "@profile-name.centerX"
      top: { ref: "@{{ 'profile-title' if title else 'profile-name' }}.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    entrance: { type: fade-up, delay: 350, duration: 600 }
  {% if bio %}
  - kind: text
    id: profile-bio
    preset: profileBio
    frame:
      centerX: "@profile-name.centerX"
      top: { ref: "@profile-divider.bottom", offset: 16 }
      w: {{ style.bioWidth }}
    text: "{{ bio }}"
    style:
      fontSize: {{ style.bioSize }}
    entrance: { type: fade-up, delay: 400, duration: 600 }
  {% endif %}
