name: statement
params:
  statement: { type: string, required: true }
  subtitle: { type: string }

{% import "scene/blocks.njk" as blocks %}

mode: scene
presets:
{{ blocks.header_presets("statementTitle", "divider") | indent(2, true) }}
{{ blocks.body_text_preset("statementSubtitle", "center", "theme.textMuted", 1.6) | indent(2, true) }}
children:
{{ blocks.centered_title_stack("statement", statement, "statementTitle", 72, subtitle, "statementSubtitle", 32, 1600, 28, 160, "divider", 120, 4, 0, 100, 200, 600) | indent(2, true) }}
