name: statement
params:
  statement: { type: string, required: true }
  subtitle: { type: string }

mode: scene
presets:
  statementTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  statementSubtitle:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.textMuted"
      textAlign: center
      lineHeight: 1.4
  divider:
    style:
      fill: "theme.accent"
children:
  - kind: text
    id: statement-title
    preset: statementTitle
    frame:
      x: 240
      y: {{ 340 if subtitle else 470 }}
      w: 1440
    text: "{{ statement }}"
    style:
      fontSize: 72
  {% if subtitle %}
  - kind: shape
    id: statement-divider
    preset: divider
    frame:
      centerX: "@statement-title.centerX"
      top: { ref: "@statement-title.bottom", offset: 28 }
      w: 120
      h: 4
    shape: rect
  - kind: text
    id: statement-subtitle
    preset: statementSubtitle
    frame:
      x: 320
      top: { ref: "@statement-divider.bottom", offset: 28 }
      w: 1280
    text: "{{ subtitle }}"
    style:
      fontSize: 32
  {% endif %}
