name: top-bottom
params:
  title: { type: string }
  top: { type: string, required: true }
  bottom: { type: string, required: true }
style:
  titleSize: { type: number, default: 56 }
  bodySize: { type: number, default: 30 }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  - type: box
    fill: true
    padding: 32
    animationType: fade-up
    children:
      - type: body
        text: "{{ top }}"
        fontSize: {{ style.bodySize }}
  - type: divider
    variant: gradient
    width: 200
    align: center
  - type: box
    fill: true
    padding: 32
    animationType: fade-up
    children:
      - type: body
        text: "{{ bottom }}"
        fontSize: {{ style.bodySize }}
