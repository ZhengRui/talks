name: comparison
scope: slide
params:
  title: { type: string }
  left: { type: object, required: true }
  right: { type: object, required: true }
  verticalAlign: { type: string }
style:
  titleSize: { type: number, default: 56 }
  headingSize: { type: number, default: 36 }
  bodySize: { type: number, default: 30 }
  leftAccent: { type: string, default: "#22c55e" }
  rightAccent: { type: string, default: "#ef4444" }

{% import "scene/blocks.njk" as blocks %}

{% set sidePad = 160 %}
{% set topPad = 60 %}
{% set columnGap = 32 %}
{% set cardWidth = (1920 - (sidePad * 2) - columnGap) / 2 %}
{% set headingWidth = cardWidth - 64 %}
{% set leftHeadingHeight = left.heading | text_height(style.headingSize, 1.15, headingWidth, 700) %}
{% set rightHeadingHeight = right.heading | text_height(style.headingSize, 1.15, headingWidth, 700) %}
{% set headingHeight = leftHeadingHeight if leftHeadingHeight > rightHeadingHeight else rightHeadingHeight %}
{% set leftListHeight = left.items | list_height(style.bodySize, 1.6, headingWidth, 10, false, 400) %}
{% set rightListHeight = right.items | list_height(style.bodySize, 1.6, headingWidth, 10, false, 400) %}
{% set listHeight = leftListHeight if leftListHeight > rightListHeight else rightListHeight %}
{% set cardHeight = headingHeight + listHeight + 107 %}
{% set titleHeight = (style.titleSize * 1.15) + (style.titleSize * 0.15) %}
{% set layoutY = topPad if not title else (topPad + titleHeight + 16 + 4 + 40) %}
{% if not title and verticalAlign == "center" %}
{% set layoutY = (1080 - cardHeight) / 2 %}
{% endif %}

presets:
{{ blocks.header_presets("sectionTitle", "divider") | indent(2, true) }}
{{ blocks.surface_card_preset("compareCard") | indent(2, true) }}
{{ blocks.heading_text_preset("compareHeading", "left") | indent(2, true) }}
children:
  {% if title %}
{{ blocks.section_title("comparison-header", 160, 60, 1600, title, style.titleSize, 80, 16, "sectionTitle", "divider", 0, 100, 600) | indent(2, true) }}
  {% endif %}
  - kind: group
    id: comparison-layout
    frame: { x: 160, y: {{ layoutY }}, w: 1600, h: {{ cardHeight }} }
    layout:
      type: row
      gap: 32
      align: stretch
    children:
      - kind: group
        id: comparison-left-card
        preset: compareCard
        border:
          width: 3
          color: "{{ style.leftAccent }}"
          sides: ["top"]
        entrance: { type: slide-left, delay: 200, duration: 600 }
        children:
          - kind: text
            id: comparison-left-heading
            preset: compareHeading
            frame: { left: 32, top: 35, right: 32, h: {{ headingHeight }} }
            text: "{{ left.heading | yaml_string }}"
            style:
              fontSize: {{ style.headingSize }}
          - kind: ir
            id: comparison-left-items
            frame:
              left: 32
              top: { ref: "@comparison-left-heading.bottom", offset: 16 }
              right: 32
              h: {{ leftListHeight }}
            element:
              kind: list
              id: comparison-left-list
              rect: { x: 0, y: 0, w: {{ headingWidth }}, h: {{ leftListHeight }} }
              items: {{ left.items }}
              ordered: false
              itemSpacing: 10
              bulletColor: "theme.text"
              itemStyle:
                fontFamily: "body"
                fontSize: {{ style.bodySize }}
                fontWeight: 400
                color: "theme.text"
                lineHeight: 1.6
      - kind: group
        id: comparison-right-card
        preset: compareCard
        border:
          width: 3
          color: "{{ style.rightAccent }}"
          sides: ["top"]
        entrance: { type: slide-right, delay: 300, duration: 600 }
        children:
          - kind: text
            id: comparison-right-heading
            preset: compareHeading
            frame: { left: 32, top: 35, right: 32, h: {{ headingHeight }} }
            text: "{{ right.heading | yaml_string }}"
            style:
              fontSize: {{ style.headingSize }}
          - kind: ir
            id: comparison-right-items
            frame:
              left: 32
              top: { ref: "@comparison-right-heading.bottom", offset: 16 }
              right: 32
              h: {{ rightListHeight }}
            element:
              kind: list
              id: comparison-right-list
              rect: { x: 0, y: 0, w: {{ headingWidth }}, h: {{ rightListHeight }} }
              items: {{ right.items }}
              ordered: false
              itemSpacing: 10
              bulletColor: "theme.text"
              itemStyle:
                fontFamily: "body"
                fontSize: {{ style.bodySize }}
                fontWeight: 400
                color: "theme.text"
                lineHeight: 1.6
