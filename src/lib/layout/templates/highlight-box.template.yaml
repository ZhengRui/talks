name: highlight-box
params:
  title: { type: string }
  body: { type: string, required: true }
  variant: { type: string }
style:
  titleSize: { type: number, default: 56 }
  bodySize: { type: number, default: 30 }
  boxWidth: { type: number, default: 1200 }

base: full-compose
verticalAlign: top
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  - type: box
    maxWidth: {{ style.boxWidth }}
    padding: 48
    {% if variant == "warning" %}
    background: theme.highlightWarningBg
    borderColor: theme.highlightWarningBorder
    {% elif variant == "success" %}
    background: theme.highlightSuccessBg
    borderColor: theme.highlightSuccessBorder
    {% else %}
    background: theme.highlightInfoBg
    borderColor: theme.highlightInfoBorder
    {% endif %}
    borderWidth: 2
    variant: panel
    animationType: scale-up
    children:
      - type: body
        text: "{{ body }}"
        fontSize: {{ style.bodySize }}
