name: highlight-box
scope: slide
params:
  title: { type: string }
  body: { type: string, required: true }
  variant: { type: string }
style:
  titleSize: { type: number, default: 56 }
  bodySize: { type: number, default: 30 }
  boxWidth: { type: number, default: 1200 }

{% import "scene/blocks.njk" as blocks %}

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set bodyWidth = style.boxWidth - 96 %}
{% set bodyHeight = body | text_height(style.bodySize, 1.6, bodyWidth, 400) %}
{% set boxHeight = bodyHeight + 96 %}
{% set boxX = (1920 - style.boxWidth) / 2 %}
{% if variant == "warning" %}
{% set boxBg = "theme.highlightWarningBg" %}
{% set boxBorder = "theme.highlightWarningBorder" %}
{% elif variant == "success" %}
{% set boxBg = "theme.highlightSuccessBg" %}
{% set boxBorder = "theme.highlightSuccessBorder" %}
{% else %}
{% set boxBg = "theme.highlightInfoBg" %}
{% set boxBorder = "theme.highlightInfoBorder" %}
{% endif %}

presets:
{{ blocks.header_presets("centeredTitle", "divider") | indent(2, true) }}
{{ blocks.body_text_preset("bodyText", "left", "theme.text", 1.6) | indent(2, true) }}
children:
  {% if title %}
  - kind: text
    id: highlight-box-title
    preset: centeredTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title | yaml_string }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: highlight-box-divider
    preset: divider
    frame:
      centerX: "@highlight-box-title.centerX"
      top: { ref: "@highlight-box-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: group
    id: highlight-box-card
    frame: { x: {{ boxX }}, y: {{ contentTop }}, w: {{ style.boxWidth }}, h: {{ boxHeight }} }
    style:
      fill: "{{ boxBg }}"
    borderRadius: 12
    border:
      width: 2
      color: "{{ boxBorder }}"
    clipContent: true
    entrance: { type: scale-up, delay: {{ 200 if title else 0 }}, duration: 600 }
    children:
      - kind: text
        id: highlight-box-body
        preset: bodyText
        frame: { x: 48, y: 48, w: {{ bodyWidth }}, h: {{ bodyHeight }} }
        text: "{{ body | yaml_string }}"
        style:
          fontSize: {{ style.bodySize }}
