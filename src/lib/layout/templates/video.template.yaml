name: video
params:
  src: { type: string, required: true }
  title: { type: string }
  poster: { type: string }
style:
  titleSize: { type: number, default: 56 }
  height: { type: number }

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set mediaHeight = style.height if style.height else (1020 - contentTop) %}

mode: scene
presets:
  centeredTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      gradient: "theme.accentGradient"
children:
  {% if title %}
  - kind: text
    id: video-title
    preset: centeredTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title | yaml_string }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: video-divider
    preset: divider
    frame:
      centerX: "@video-title.centerX"
      top: { ref: "@video-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: ir
    id: video-block
    frame: { x: 160, y: {{ contentTop }}, w: 1600, h: {{ mediaHeight }} }
    entrance: { type: fade-up, delay: {{ 200 if title else 0 }}, duration: 600 }
    element:
      kind: video
      id: video-element
      rect: { x: 0, y: 0, w: 1600, h: {{ mediaHeight }} }
      src: "{{ src }}"
      {% if poster %}
      poster: "{{ poster }}"
      {% endif %}
      borderRadius: "theme.radius"
      border: "theme.cardBorder"
      shadow: "theme.shadow"
