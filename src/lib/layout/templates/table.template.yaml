name: table
params:
  title: { type: string }
  headers: { type: array, required: true }
  rows: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  fontSize: { type: number, default: 26 }
  headerFontSize: { type: number, default: 26 }
  rowH: { type: number, default: 68 }
  headerH: { type: number, default: 72 }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  {% set pw = 1600 %}
  {% set colCount = headers.length %}
  {% set colW = pw / colCount %}
  {% set tableH = style.headerH + rows.length * style.rowH %}
  - type: raw
    height: {{ tableH }}
    elements:
      - kind: group
        id: tbl-group
        rect: { x: 0, y: 0, w: {{ pw }}, h: {{ tableH }} }
        entrance: { type: fade-in, delay: 200, duration: 500 }
        children:
          # Layer 1: Full-size rounded rect with accent fill
          # Provides outer rounded corners + header background color
          - kind: shape
            id: tbl-accent-bg
            rect: { x: 0, y: 0, w: {{ pw }}, h: {{ tableH }} }
            shape: rect
            style: { fill: "theme.accent", borderRadius: 12 }
          # Layer 2: Data area rounded rect with cell bg
          # Rounded bottom corners match outer frame
          {% if rows.length > 0 %}
          - kind: shape
            id: tbl-data-bg
            rect: { x: 0, y: {{ style.headerH }}, w: {{ pw }}, h: {{ tableH - style.headerH }} }
            shape: rect
            style: { fill: "theme.cardBg", borderRadius: 12 }
          {% endif %}
          # Layer 3: Alternating row backgrounds (even rows only — odd show Layer 2)
          {% for row in rows %}
          {% set rowIdx = loop.index0 %}
          {% set rowY = style.headerH + rowIdx * style.rowH %}
          {% if rowIdx % 2 == 0 %}
          - kind: shape
            id: "tbl-row-bg-{{ rowIdx }}"
            rect: { x: 0, y: {{ rowY }}, w: {{ pw }}, h: {{ style.rowH }} }
            shape: rect
            {% if loop.last %}
            style: { fill: "theme.bgTertiary", borderRadius: 12 }
            {% else %}
            style: { fill: "theme.bgTertiary" }
            {% endif %}
          {% endif %}
          {% endfor %}
          # Row border lines
          {% for row in rows %}
          {% set rowIdx = loop.index0 %}
          - kind: shape
            id: "tbl-row-border-{{ rowIdx }}"
            rect: { x: 0, y: {{ style.headerH + rowIdx * style.rowH }}, w: {{ pw }}, h: 1 }
            shape: rect
            style: { fill: "theme.border.color" }
          {% endfor %}
          # Header texts
          {% for h in headers %}
          - kind: text
            id: "tbl-hdr-{{ loop.index0 }}"
            rect: { x: {{ loop.index0 * colW + 24 }}, y: 0, w: {{ colW - 48 }}, h: {{ style.headerH }} }
            text: "{{ h }}"
            style:
              fontFamily: "theme.fontHeading"
              fontSize: {{ style.headerFontSize }}
              fontWeight: 600
              color: "theme.bg"
              lineHeight: 1.4
              textAlign: left
              verticalAlign: middle
          {% endfor %}
          # Cell texts
          {% for row in rows %}
          {% set rowIdx = loop.index0 %}
          {% for cell in row %}
          - kind: text
            id: "tbl-cell-{{ rowIdx }}-{{ loop.index0 }}"
            rect: { x: {{ loop.index0 * colW + 24 }}, y: {{ style.headerH + rowIdx * style.rowH }}, w: {{ colW - 48 }}, h: {{ style.rowH }} }
            text: "{{ cell }}"
            style:
              fontFamily: "theme.fontBody"
              fontSize: {{ style.fontSize }}
              fontWeight: 400
              color: "theme.text"
              lineHeight: 1.4
              textAlign: left
              verticalAlign: middle
          {% endfor %}
          {% endfor %}
