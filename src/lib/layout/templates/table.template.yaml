name: table
scope: slide
params:
  title: { type: string }
  headers: { type: array, required: true }
  rows: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  fontSize: { type: number, default: 26 }
  headerFontSize: { type: number, default: 26 }
  rowH: { type: number, default: 68 }
  headerH: { type: number, default: 72 }

{% import "scene/blocks.njk" as blocks %}

{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = 60 if not title else (60 + titleHeight + 16 + 4 + 40) %}
{% set pw = 1600 %}
{% set colCount = headers.length if headers.length > 0 else 1 %}
{% set colW = pw / colCount %}
{% set tableH = style.headerH + rows.length * style.rowH %}

presets:
{{ blocks.header_presets("centeredTitle", "divider") | indent(2, true) }}
children:
  {% if title %}
  - kind: text
    id: table-title
    preset: centeredTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title | yaml_string }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: table-divider
    preset: divider
    frame:
      centerX: "@table-title.centerX"
      top: { ref: "@table-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: ir
    id: table-body
    frame: { x: 160, y: {{ contentTop }}, w: {{ pw }}, h: {{ tableH }} }
    element:
      kind: group
      id: tbl-group
      rect: { x: 0, y: 0, w: {{ pw }}, h: {{ tableH }} }
      entrance: { type: fade-in, delay: 200, duration: 500 }
      children:
        - kind: shape
          id: tbl-accent-bg
          rect: { x: 0, y: 0, w: {{ pw }}, h: {{ tableH }} }
          shape: rect
          style: { fill: "theme.accent" }
          borderRadius: 12
        {% if rows.length > 0 %}
        - kind: shape
          id: tbl-data-bg
          rect: { x: 0, y: {{ style.headerH }}, w: {{ pw }}, h: {{ tableH - style.headerH }} }
          shape: rect
          style: { fill: "theme.cardBg" }
          borderRadius: 12
        {% endif %}
        {% for row in rows %}
        {% set rowIdx = loop.index0 %}
        {% set rowY = style.headerH + rowIdx * style.rowH %}
        {% if rowIdx % 2 == 0 %}
        - kind: shape
          id: "tbl-row-bg-{{ rowIdx }}"
          rect: { x: 0, y: {{ rowY }}, w: {{ pw }}, h: {{ style.rowH }} }
          shape: rect
          {% if loop.last %}
          style: { fill: "theme.bgTertiary" }
          borderRadius: 12
          {% else %}
          style: { fill: "theme.bgTertiary" }
          {% endif %}
        {% endif %}
        {% endfor %}
        {% for row in rows %}
        {% set rowIdx = loop.index0 %}
        - kind: shape
          id: "tbl-row-border-{{ rowIdx }}"
          rect: { x: 0, y: {{ style.headerH + rowIdx * style.rowH }}, w: {{ pw }}, h: 1 }
          shape: rect
          style: { fill: "theme.border.color" }
        {% endfor %}
        {% for h in headers %}
        - kind: text
          id: "tbl-hdr-{{ loop.index0 }}"
          rect: { x: {{ loop.index0 * colW + 24 }}, y: 0, w: {{ colW - 48 }}, h: {{ style.headerH }} }
          text: "{{ h | yaml_string }}"
          style:
            fontFamily: "theme.fontHeading"
            fontSize: {{ style.headerFontSize }}
            fontWeight: 600
            color: "theme.bg"
            lineHeight: 1.4
            textAlign: left
            verticalAlign: middle
        {% endfor %}
        {% for row in rows %}
        {% set rowIdx = loop.index0 %}
        {% for cell in row %}
        - kind: text
          id: "tbl-cell-{{ rowIdx }}-{{ loop.index0 }}"
          rect: { x: {{ loop.index0 * colW + 24 }}, y: {{ style.headerH + rowIdx * style.rowH }}, w: {{ colW - 48 }}, h: {{ style.rowH }} }
          text: "{{ cell | yaml_string }}"
          style:
            fontFamily: "theme.fontBody"
            fontSize: {{ style.fontSize }}
            fontWeight: 400
            color: "theme.text"
            lineHeight: 1.4
            textAlign: left
            verticalAlign: middle
        {% endfor %}
        {% endfor %}
