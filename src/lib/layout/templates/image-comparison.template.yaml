name: image-comparison
scope: slide
params:
  title: { type: string }
  before: { type: object, required: true }
  after: { type: object, required: true }
style:
  titleSize: { type: number, default: 56 }
  labelSize: { type: number, default: 24 }
  imageHeight: { type: number, default: 730 }

{% import "scene/blocks.njk" as blocks %}

{% set topPad = 60 %}
{% set sidePad = 160 %}
{% set columnGap = 32 %}
{% set cardWidth = (1920 - (sidePad * 2) - columnGap) / 2 %}
{% set innerWidth = cardWidth - 48 %}
{% set beforeLabelHeight = before.label | text_height(style.labelSize, 1.6, innerWidth, 700) if before.label else 0 %}
{% set afterLabelHeight = after.label | text_height(style.labelSize, 1.6, innerWidth, 700) if after.label else 0 %}
{% set labelHeight = beforeLabelHeight if beforeLabelHeight > afterLabelHeight else afterLabelHeight %}
{% set hasLabel = before.label or after.label %}
{% set cardHeight = 24 + style.imageHeight + (16 + labelHeight + 24 if hasLabel else 24) %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set layoutY = topPad if not title else (topPad + titleHeight + 16 + 4 + 40) %}

presets:
{{ blocks.header_presets("sectionTitle", "divider") | indent(2, true) }}
{{ blocks.surface_card_preset("imageCard") | indent(2, true) }}
{{ blocks.body_text_preset("imageLabel", "center", "theme.text", 1.6, 700) | indent(2, true) }}
children:
  {% if title %}
  - kind: text
    id: image-comparison-header-title
    preset: sectionTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: image-comparison-header-divider
    preset: divider
    frame:
      centerX: "@image-comparison-header-title.centerX"
      top: { ref: "@image-comparison-header-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: group
    id: image-comparison-layout
    frame: { x: 160, y: {{ layoutY }}, w: 1600, h: {{ cardHeight }} }
    layout:
      type: row
      gap: 32
      align: stretch
    children:
      - kind: group
        id: image-comparison-before-card
        preset: imageCard
        entrance: { type: slide-left, delay: 200, duration: 600 }
        children:
          - kind: image
            id: image-comparison-before-image
            frame: { left: 24, top: 24, right: 24, h: {{ style.imageHeight }} }
            src: "{{ before.image }}"
            objectFit: cover
            borderRadius: 8
          {% if before.label %}
          - kind: text
            id: image-comparison-before-label
            preset: imageLabel
            frame:
              left: 24
              top: { ref: "@image-comparison-before-image.bottom", offset: 16 }
              right: 24
              h: {{ beforeLabelHeight }}
            text: "{{ before.label | yaml_string }}"
            style:
              fontSize: {{ style.labelSize }}
          {% endif %}
      - kind: group
        id: image-comparison-after-card
        preset: imageCard
        entrance: { type: slide-right, delay: 200, duration: 600 }
        children:
          - kind: image
            id: image-comparison-after-image
            frame: { left: 24, top: 24, right: 24, h: {{ style.imageHeight }} }
            src: "{{ after.image }}"
            objectFit: cover
            borderRadius: 8
          {% if after.label %}
          - kind: text
            id: image-comparison-after-label
            preset: imageLabel
            frame:
              left: 24
              top: { ref: "@image-comparison-after-image.bottom", offset: 16 }
              right: 24
              h: {{ afterLabelHeight }}
            text: "{{ after.label | yaml_string }}"
            style:
              fontSize: {{ style.labelSize }}
          {% endif %}
