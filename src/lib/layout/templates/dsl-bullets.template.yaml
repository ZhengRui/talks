name: dsl-bullets
params:
  title: { type: string, required: true }
  bullets: { type: "string[]", required: true }
style:
  titleSize: { type: number, default: 56 }
  bulletVariant: { type: string, default: card }

base: full-compose
children:
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
  - type: divider
    variant: gradient
    width: 80
    marginTop: 16
    marginBottom: 40
  - type: bullets
    items: {{ bullets }}
    variant: {{ style.bulletVariant }}
