name: image-gallery
params:
  title: { type: string }
  images: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  imageHeight: { type: number }
  captionSize: { type: number, default: 22 }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: top
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      {% endif %}
      - type: box
        fill: true
        variant: flat
        padding: 0
        children:
          - type: columns
            gap: 32
            children:
              {% for img in images %}
              - type: box
                variant: flat
                padding: 0
                children:
                  - type: image
                    src: "{{ img.src }}"
                    {% if style.imageHeight %}
                    height: {{ style.imageHeight }}
                    {% endif %}
                    objectFit: cover
                    borderRadius: 16
                    entranceType: scale-up
                  {% if img.caption %}
                  - type: text
                    text: "{{ img.caption }}"
                    fontSize: {{ style.captionSize }}
                    textAlign: center
                    color: theme.textMuted
                    margin: [12, 0, 0, 0]
                  {% endif %}
              {% endfor %}
