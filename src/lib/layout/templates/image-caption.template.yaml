name: image-caption
params:
  title: { type: string }
  image: { type: string, required: true }
  caption: { type: string, required: true }
style:
  titleSize: { type: number, default: 56 }
  imageHeight: { type: number }
  captionSize: { type: number, default: 26 }
  captionWidth: { type: number, default: 900 }
  captionLineHeight: { type: number, default: 1.5 }

{% import "scene/blocks.njk" as blocks %}

{% set topPad = 60 %}
{% set sidePad = 160 %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set captionHeight = caption | text_height(style.captionSize, style.captionLineHeight, style.captionWidth, 400) %}
{% set contentTop = topPad if not title else (topPad + titleHeight + 16 + 4 + 40) %}
{% set resolvedImageHeight = style.imageHeight or (1080 - contentTop - 20 - captionHeight - topPad) %}

mode: scene
presets:
{{ blocks.header_presets("sectionTitle", "divider") | indent(2, true) }}
{{ blocks.body_text_preset("captionText", "center", "theme.textMuted", style.captionLineHeight) | indent(2, true) }}
children:
  {% if title %}
  - kind: text
    id: image-caption-header-title
    preset: sectionTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: image-caption-header-divider
    preset: divider
    frame:
      centerX: "@image-caption-header-title.centerX"
      top: { ref: "@image-caption-header-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: image
    id: image-caption-image
    frame: { x: {{ sidePad }}, y: {{ contentTop }}, w: 1600, h: {{ resolvedImageHeight }} }
    src: "{{ image }}"
    objectFit: contain
    borderRadius: 16
    entrance: { type: scale-up, delay: 200, duration: 600 }
  - kind: text
    id: image-caption-caption
    preset: captionText
    frame:
      centerX: "@image-caption-image.centerX"
      top: { ref: "@image-caption-image.bottom", offset: 20 }
      w: {{ style.captionWidth }}
      h: {{ captionHeight }}
    text: "{{ caption }}"
    style:
      fontSize: {{ style.captionSize }}
      lineHeight: {{ style.captionLineHeight }}
    entrance: { type: fade-up, delay: 400, duration: 600 }
