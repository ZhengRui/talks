name: image-grid
params:
  title: { type: string }
  images: { type: array, required: true }
  columns: { type: number }
style:
  titleSize: { type: number, default: 56 }
  imageHeight: { type: number }
  captionSize: { type: number, default: 24 }

{% set topPad = 60 %}
{% set sidePad = 160 %}
{% set resolvedColumns = columns or 2 %}
{% set columnGap = 32 %}
{% set rowGap = 32 %}
{% set captionGap = 24 %}
{% set captionLineHeight = 1.6 %}
{% set cardWidth = (1920 - (sidePad * 2) - (columnGap * (resolvedColumns - 1))) / resolvedColumns %}
{% set rowCount = ((images | length) / resolvedColumns) | round(0, "ceil") %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = topPad if not title else (topPad + titleHeight + 16 + 4 + 40) %}
{% set contentHeight = 1080 - contentTop - topPad %}
{% set rowHeight = (contentHeight - (rowGap * (rowCount - 1))) / rowCount %}

mode: scene
presets:
  sectionTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      gradient: "theme.accentGradient"
  gridCaption:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.textMuted"
      textAlign: center
      lineHeight: {{ captionLineHeight }}
children:
  {% if title %}
  - kind: text
    id: image-grid-header-title
    preset: sectionTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: image-grid-header-divider
    preset: divider
    frame:
      centerX: "@image-grid-header-title.centerX"
      top: { ref: "@image-grid-header-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: group
    id: image-grid-layout
    frame: { x: 160, y: {{ contentTop }}, w: 1600, h: {{ contentHeight }} }
    layout:
      type: grid
      columns: {{ resolvedColumns }}
      columnGap: 32
      rowGap: 32
      rowHeight: {{ rowHeight }}
    children:
      {% for img in images %}
      {% set captionHeight = img.caption | text_height(style.captionSize, captionLineHeight, cardWidth, 400) if img.caption else 0 %}
      {% set resolvedImageHeight = style.imageHeight or (rowHeight - (captionGap + captionHeight if img.caption else 0)) %}
      - kind: group
        id: image-grid-item-{{ loop.index }}
        entrance: { type: fade-up, delay: {{ 200 + (loop.index0 * 100) }}, duration: 600 }
        children:
          - kind: image
            id: image-grid-item-{{ loop.index }}-image
            frame: { x: 0, y: 0, w: {{ cardWidth }}, h: {{ resolvedImageHeight }} }
            src: "{{ img.src }}"
            objectFit: cover
            borderRadius: 16
            entrance: { type: scale-up, delay: {{ 200 + (loop.index0 * 100) }}, duration: 600 }
          {% if img.caption %}
          - kind: text
            id: image-grid-item-{{ loop.index }}-caption
            preset: gridCaption
            frame:
              x: 0
              top: { ref: "@image-grid-item-{{ loop.index }}-image.bottom", offset: {{ captionGap }} }
              w: {{ cardWidth }}
              h: {{ captionHeight }}
            text: "{{ img.caption | yaml_string }}"
            style:
              fontSize: {{ style.captionSize }}
          {% endif %}
      {% endfor %}
