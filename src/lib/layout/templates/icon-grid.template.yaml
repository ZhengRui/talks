name: icon-grid
params:
  title: { type: string }
  items: { type: array, required: true }
  columns: { type: number }
style:
  titleSize: { type: number, default: 56 }
  iconSize: { type: number, default: 48 }
  labelSize: { type: number, default: 26 }
  cardHeight: { type: number }

{% set topPad = 60 %}
{% set sidePad = 160 %}
{% set resolvedColumns = columns or 3 %}
{% set columnGap = 32 %}
{% set rowGap = 32 %}
{% set cardPadding = 24 %}
{% set resolvedCardHeight = style.cardHeight %}
{% set rowCount = ((items | length) / resolvedColumns) | round(0, "ceil") %}
{% set cardWidth = (1920 - (sidePad * 2) - (columnGap * (resolvedColumns - 1))) / resolvedColumns %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) if title else 0 %}
{% set contentTop = topPad if not title else (topPad + titleHeight + 16 + 4 + 40) %}
{% set contentHeight = 1080 - contentTop - topPad %}
{% set rowHeight = resolvedCardHeight or ((contentHeight - (rowGap * (rowCount - 1))) / rowCount) %}
{% set gridHeight = (rowHeight * rowCount) + (rowGap * (rowCount - 1)) %}
{% set gridTop = contentTop + ((contentHeight - gridHeight) / 2) %}

mode: scene
presets:
  sectionTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      gradient: "theme.accentGradient"
  iconCard:
    borderRadius: 12
    shadow:
      offsetX: 0
      offsetY: 4
      blur: 24
      spread: 0
      color: "rgba(0, 0, 0, 0.06)"
    border:
      width: 1
      color: "theme.border.color"
    style:
      fill: "theme.bgSecondary"
  iconGlyph:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: center
      lineHeight: 1.6
  iconLabel:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.text"
      textAlign: center
      lineHeight: 1.6
children:
  {% if title %}
  - kind: text
    id: icon-grid-header-title
    preset: sectionTitle
    frame: { x: 160, y: 60, w: 1600, h: {{ titleHeight }} }
    text: "{{ title }}"
    style:
      fontSize: {{ style.titleSize }}
    entrance: { type: fade-up, delay: 0, duration: 600 }
  - kind: shape
    id: icon-grid-header-divider
    preset: divider
    frame:
      centerX: "@icon-grid-header-title.centerX"
      top: { ref: "@icon-grid-header-title.bottom", offset: 16 }
      w: 80
      h: 4
    shape: rect
    borderRadius: 2
    entrance: { type: fade-up, delay: 100, duration: 600 }
  {% endif %}
  - kind: group
    id: icon-grid-layout
    frame: { x: 160, y: {{ gridTop }}, w: 1600, h: {{ gridHeight }} }
    layout:
      type: grid
      columns: {{ resolvedColumns }}
      columnGap: 32
      rowGap: 32
      rowHeight: {{ rowHeight }}
    children:
      {% for item in items %}
      - kind: group
        id: icon-grid-item-{{ loop.index }}
        preset: iconCard
        entrance: { type: scale-up, delay: {{ 200 + (loop.index0 * 100) }}, duration: 600 }
        layout:
          type: stack
          gap: 16
          align: center
          justify: center
          padding: 24
        children:
          - kind: text
            id: icon-grid-item-{{ loop.index }}-icon
            preset: iconGlyph
            frame: { w: {{ cardWidth - (cardPadding * 2) }} }
            text: "{{ item.icon | yaml_string }}"
            style:
              fontSize: {{ style.iconSize }}
          - kind: text
            id: icon-grid-item-{{ loop.index }}-label
            preset: iconLabel
            frame: { w: {{ cardWidth - (cardPadding * 2) }} }
            text: "{{ item.label | yaml_string }}"
            style:
              fontSize: {{ style.labelSize }}
      {% endfor %}
