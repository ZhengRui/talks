name: icon-grid
params:
  title: { type: string }
  items: { type: array, required: true }
  columns: { type: number }
style:
  titleSize: { type: number, default: 56 }
  iconSize: { type: number, default: 48 }
  labelSize: { type: number, default: 26 }
  cardHeight: { type: number }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  - type: spacer
    flex: true
  - type: grid
    columns: {{ columns or 3 }}
    gap: 32
    equalHeight: true
    children:
      {% for item in items %}
      - type: box
        padding: 24
        verticalAlign: center
        {% if style.cardHeight %}
        height: {{ style.cardHeight }}
        {% else %}
        fill: true
        {% endif %}
        animationType: scale-up
        children:
          - type: text
            text: "{{ item.icon }}"
            fontSize: {{ style.iconSize }}
            textAlign: center
          - type: text
            text: "{{ item.label }}"
            fontSize: {{ style.labelSize }}
            textAlign: center
      {% endfor %}
  - type: spacer
    flex: true
