name: cover
params:
  title: { type: string, required: true }
  subtitle: { type: string }
  author: { type: string }
  image: { type: string }
  overlay: { type: string }
style:
  titleSize: { type: number, default: 80 }
  subtitleSize: { type: number, default: 42 }

{% import "scene/blocks.njk" as blocks %}

{% set hasImage = image %}
{% set resolvedOverlay = overlay or "dark" %}
{% set darkText = hasImage and resolvedOverlay != "light" %}
{% set titleColor = "#ffffff" if darkText else "theme.heading" %}
{% set bodyColor = "#ffffff" if darkText else "theme.text" %}
{% set bodyShadow = "0 2px 12px rgba(0,0,0,0.7)" if darkText else none %}
{% set tagWidth = (author | length) * 20 * 0.7 + 40 if author else 0 %}
{% set titleHeight = title | text_height(style.titleSize, 1.15, 1600, 700) %}
{% set subtitleHeight = subtitle | text_height(style.subtitleSize, 1.6, 1600, 400) if subtitle else 0 %}
{% set stackHeight = titleHeight + 16 + 4 + (40 + subtitleHeight if subtitle else 0) + (16 + 44 if author else 0) %}
{% set stackY = 60 + (960 - stackHeight) / 2 %}

mode: scene
{% if image %}
background:
  type: image
  src: "{{ image }}"
  overlay: "{{ resolvedOverlay }}"
{% endif %}
presets:
{{ blocks.accent_pill_presets(
  "authorPill",
  "authorPillText",
  "rgba(255,255,255,0.15)" if darkText else "theme.accent@0.13",
  "rgba(255,255,255,0.2)" if darkText else "theme.accent",
  "rgba(255,255,255,0.9)" if darkText else "theme.accent"
) | indent(2, true) }}
{{ blocks.heading_text_preset("coverTitle", "center", titleColor) | indent(2, true) }}
  divider:
    style:
      gradient: "theme.accentGradient"
{{ blocks.body_text_preset("coverSubtitle", "center", bodyColor, 1.6, 400, none, none, bodyShadow) | indent(2, true) }}
children:
  - kind: group
    id: cover-stack
    frame: { x: 0, y: 0, w: 1920, h: 1080 }
    children:
      - kind: text
        id: cover-title
        preset: coverTitle
        frame: { x: 160, y: {{ stackY }}, w: 1600, h: {{ titleHeight }} }
        text: "{{ title | yaml_string }}"
        style:
          fontSize: {{ style.titleSize }}
        entrance: { type: fade-up, delay: 0, duration: 600 }
      - kind: shape
        id: cover-divider
        preset: divider
        frame:
          centerX: "@cover-title.centerX"
          top: { ref: "@cover-title.bottom", offset: 16 }
          w: 120
          h: 4
        shape: rect
        borderRadius: 2
        entrance: { type: fade-up, delay: 100, duration: 600 }
      {% if subtitle %}
      - kind: text
        id: cover-subtitle
        preset: coverSubtitle
        frame:
          x: 160
          top: { ref: "@cover-divider.bottom", offset: 40 }
          w: 1600
          h: {{ subtitleHeight }}
        text: "{{ subtitle | yaml_string }}"
        style:
          fontSize: {{ style.subtitleSize }}
        entrance: { type: fade-up, delay: 200, duration: 600 }
      {% endif %}
      {% if author %}
      - kind: shape
        id: cover-author-pill
        preset: authorPill
        frame:
          centerX: 960
          y: {{ stackY + titleHeight + 16 + 4 + (40 + subtitleHeight if subtitle else 0) + (16 if author else 0) }}
          w: {{ tagWidth }}
          h: 44
        shape: pill
        entrance: { type: fade-up, delay: 300, duration: 600 }
      - kind: text
        id: cover-author
        preset: authorPillText
        frame:
          centerX: 960
          y: {{ stackY + titleHeight + 16 + 4 + (40 + subtitleHeight if subtitle else 0) + (16 if author else 0) }}
          w: {{ tagWidth }}
          h: 44
        text: "{{ author | yaml_string }}"
        style:
          fontSize: 20
        entrance: { type: fade-up, delay: 300, duration: 600 }
      {% endif %}
