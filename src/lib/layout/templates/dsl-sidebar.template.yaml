name: dsl-sidebar
params:
  title: { type: string }
  sidebar: { type: string, required: true }
  main: { type: string, required: true }
  sidebarPosition: { type: string }
style:
  titleSize: { type: number, default: 48 }
  sidebarSize: { type: number, default: 28 }
  mainSize: { type: number, default: 30 }

base: full-compose
children:
  {% if sidebarPosition == "right" %}
  - type: columns
    gap: 40
    ratio: 0.7
    children:
      - type: box
        variant: flat
        padding: 0
        animationType: none
        children:
          {% if title %}
          - type: heading
            text: "{{ title | yaml_string }}"
            fontSize: {{ style.titleSize }}
            textAlign: left
            animationType: fade-up
            animationDelay: 0
          - type: spacer
            height: 32
          {% endif %}
          - type: body
            text: "{{ main | yaml_string }}"
            fontSize: {{ style.mainSize }}
            animationType: slide-left
            animationDelay: 200
      - type: box
        variant: flat
        padding: 0
        animationType: none
        children:
          {% if title %}
          - type: spacer
            height: 76
          {% endif %}
          - type: box
            variant: panel
            padding: 40
            background: theme.bgSecondary
            animationType: slide-right
            animationDelay: 200
            fill: true
            children:
              - type: body
                text: "{{ sidebar | yaml_string }}"
                fontSize: {{ style.sidebarSize }}
  {% else %}
  - type: columns
    gap: 40
    ratio: 0.3
    children:
      - type: box
        variant: flat
        padding: 0
        animationType: none
        children:
          {% if title %}
          - type: spacer
            height: 76
          {% endif %}
          - type: box
            variant: panel
            padding: 40
            background: theme.bgSecondary
            animationType: slide-left
            animationDelay: 200
            fill: true
            children:
              - type: body
                text: "{{ sidebar | yaml_string }}"
                fontSize: {{ style.sidebarSize }}
      - type: box
        variant: flat
        padding: 0
        animationType: none
        children:
          {% if title %}
          - type: heading
            text: "{{ title | yaml_string }}"
            fontSize: {{ style.titleSize }}
            textAlign: left
            animationType: fade-up
            animationDelay: 0
          - type: spacer
            height: 32
          {% endif %}
          - type: body
            text: "{{ main | yaml_string }}"
            fontSize: {{ style.mainSize }}
            animationType: slide-right
            animationDelay: 200
  {% endif %}
