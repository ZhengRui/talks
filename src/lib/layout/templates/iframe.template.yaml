name: iframe
params:
  src: { type: string, required: true }
  title: { type: string }
style:
  titleSize: { type: number, default: 56 }
  height: { type: number }

base: full-compose
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
  - type: divider
    variant: gradient
    width: 80
    align: center
    marginTop: 16
    marginBottom: 40
  {% endif %}
  - type: iframe
    src: "{{ src }}"
    {% if style.height %}
    height: {{ style.height }}
    {% endif %}
