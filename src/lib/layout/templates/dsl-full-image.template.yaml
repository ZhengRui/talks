name: dsl-full-image
params:
  image: { type: string, required: true }
  title: { type: string }
  body: { type: string }
  overlay: { type: string }
style:
  titleSize: { type: number, default: 64 }
  bodySize: { type: number, default: 30 }

base: full-compose
backgroundImage: {{ image }}
overlay: {{ overlay or "dark" }}
verticalAlign: center
children:
  {% if title %}
  - type: heading
    text: "{{ title }}"
    fontSize: {{ style.titleSize }}
    textAlign: center
    {% if body %}
    marginBottom: 24
    {% endif %}
  {% endif %}
  {% if body %}
  - type: body
    text: "{{ body }}"
    fontSize: {{ style.bodySize }}
    textAlign: center
  {% endif %}
