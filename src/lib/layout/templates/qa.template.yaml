name: qa
params:
  question: { type: string, required: true }
  answer: { type: string, required: true }
style:
  questionSize: { type: number, default: 56 }
  answerSize: { type: number, default: 30 }
  cardWidth: { type: number, default: 1200 }

{% import "scene/blocks.njk" as blocks %}

{% set titleHeight = question | text_height(style.questionSize, 1.15, 1600, 700) %}
{% set contentTop = 60 + titleHeight + 16 + 4 + 40 %}
{% set bodyWidth = style.cardWidth - 80 %}
{% set bodyHeight = answer | text_height(style.answerSize, 1.6, bodyWidth, 400) %}
{% set cardHeight = bodyHeight + 80 %}
{% set cardX = (1920 - style.cardWidth) / 2 %}

mode: scene
presets:
{{ blocks.header_presets("centeredTitle", "divider") | indent(2, true) }}
{{ blocks.surface_card_preset("answerCard") | indent(2, true) }}
{{ blocks.body_text_preset("answerText", "left", "theme.text", 1.6) | indent(2, true) }}
children:
{{ blocks.section_title("qa", 160, 60, 1600, question, style.questionSize, 80, 16, "centeredTitle", "divider", 0, 100, 600) | indent(2, true) }}
  - kind: group
    id: qa-card
    preset: answerCard
    frame: { x: {{ cardX }}, y: {{ contentTop }}, w: {{ style.cardWidth }}, h: {{ cardHeight }} }
    entrance: { type: fade-in, delay: 200, duration: 600 }
    children:
      - kind: text
        id: qa-answer
        preset: answerText
        frame: { x: 40, y: 40, w: {{ bodyWidth }}, h: {{ bodyHeight }} }
        text: "{{ answer | yaml_string }}"
        style:
          fontSize: {{ style.answerSize }}
