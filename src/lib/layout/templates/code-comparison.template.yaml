name: code-comparison
params:
  title: { type: string }
  before: { type: object, required: true }
  after: { type: object, required: true }
style:
  titleSize: { type: number, default: 56 }
  codeFontSize: { type: number, default: 22 }
  codePadding: { type: number, default: 24 }
  labelSize: { type: number, default: 24 }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: top
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      {% endif %}
      - type: columns
        gap: 32
        children:
          - type: box
            variant: flat
            padding: 0
            entranceType: slide-left
            children:
              {% if before.label %}
              - type: text
                text: "{{ before.label }}"
                textAlign: center
                fontSize: {{ style.labelSize }}
                color: theme.textMuted
                lineHeight: 1.5
              {% endif %}
              - type: code
                code: {{ before.code | tojson }}
                fontSize: {{ style.codeFontSize }}
                padding: {{ style.codePadding }}
                {% if before.language %}
                language: {{ before.language }}
                {% endif %}
          - type: box
            variant: flat
            padding: 0
            entranceType: slide-right
            children:
              {% if after.label %}
              - type: text
                text: "{{ after.label }}"
                textAlign: center
                fontSize: {{ style.labelSize }}
                color: theme.textMuted
                lineHeight: 1.5
              {% endif %}
              - type: code
                code: {{ after.code | tojson }}
                fontSize: {{ style.codeFontSize }}
                padding: {{ style.codePadding }}
                {% if after.language %}
                language: {{ after.language }}
                {% endif %}
