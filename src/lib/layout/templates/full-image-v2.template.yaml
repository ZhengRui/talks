name: full-image-v2
params:
  image: { type: string, required: true }
  title: { type: string }
  body: { type: string }
  overlay: { type: string }
style:
  titleSize: { type: number, default: 64 }
  bodySize: { type: number, default: 30 }

backgroundImage: {{ image }}
overlay: {{ overlay or "dark" }}
children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: center
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      {% if title %}
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
        {% if body %}
        margin: [0, 0, 28, 0]
        {% endif %}
      {% endif %}
      {% if body %}
      - type: body
        text: "{{ body }}"
        fontSize: {{ style.bodySize }}
        textAlign: center
      {% endif %}
