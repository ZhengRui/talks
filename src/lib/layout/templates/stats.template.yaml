name: stats
params:
  title: { type: string }
  stats: { type: array, required: true }
style:
  titleSize: { type: number, default: 56 }
  statFontSize: { type: number, default: 72 }
  labelFontSize: { type: number, default: 26 }
  cardHeight: { type: number, default: 200 }

{% import "scene/blocks.njk" as scene %}
mode: scene
presets:
  sectionTitle:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.heading"
      textAlign: center
      lineHeight: 1.15
  divider:
    style:
      fill: "theme.accent"
  statCard:
    borderRadius: 18
    style:
      fill: "theme.bgSecondary"
    border:
      width: 1
      color: "theme.border.color"
  statValue:
    style:
      fontFamily: "heading"
      fontWeight: 700
      color: "theme.accent"
      textAlign: center
      lineHeight: 1
  statLabel:
    style:
      fontFamily: "body"
      fontWeight: 400
      color: "theme.textMuted"
      textAlign: center
      lineHeight: 1.3
children:
  {% if title %}
{{ scene.section_title("stats-header", 160, 60, 1600, title, style.titleSize, 80, 16) | indent_yaml(2) }}
  - kind: group
    id: stats-grid
    frame: { x: 160, y: 360, w: 1600, h: {{ style.cardHeight }} }
    layout:
      type: grid
      columns: {{ stats | length }}
      columnGap: 32
    children:
      {% for s in stats %}
{{ scene.stat_panel("stat-" ~ loop.index, style.cardHeight, s.value, s.label, "statCard", "statValue", "statLabel") | indent_yaml(6) }}
      {% endfor %}
  {% else %}
  - kind: group
    id: stats-grid
    frame: { x: 160, y: 440, w: 1600, h: {{ style.cardHeight }} }
    layout:
      type: grid
      columns: {{ stats | length }}
      columnGap: 32
    children:
      {% for s in stats %}
{{ scene.stat_panel("stat-" ~ loop.index, style.cardHeight, s.value, s.label, "statCard", "statValue", "statLabel") | indent_yaml(6) }}
      {% endfor %}
  {% endif %}
