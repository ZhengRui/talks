name: section-divider
params:
  title: { type: string, required: true }
  subtitle: { type: string }
  image: { type: string }
  overlay: { type: string }
style:
  titleSize: { type: number, default: 80 }
  subtitleSize: { type: number, default: 32 }

{% if image %}
backgroundImage: {{ image }}
overlay: {{ overlay or "dark" }}
{% endif %}
children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: center
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      - type: heading
        text: "{{ title }}"
        fontSize: {{ style.titleSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 120
        align: center
        margin: [16, 0, 32, 0]
      {% if subtitle %}
      - type: body
        text: "{{ subtitle }}"
        fontSize: {{ style.subtitleSize }}
        textAlign: center
      {% endif %}
