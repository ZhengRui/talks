name: qa-v2
params:
  question: { type: string, required: true }
  answer: { type: string, required: true }
style:
  questionSize: { type: number, default: 56 }
  answerSize: { type: number, default: 30 }
  cardWidth: { type: number, default: 1200 }

children:
  - type: box
    variant: flat
    padding: [60, 160]
    height: 1080
    verticalAlign: top
    layout: { type: flex, direction: column, gap: 0 }
    autoEntrance: { type: fade-up, stagger: 100 }
    children:
      - type: heading
        text: "{{ question }}"
        fontSize: {{ style.questionSize }}
        textAlign: center
      - type: divider
        variant: gradient
        width: 80
        align: center
        margin: [16, 0, 40, 0]
      - type: box
        maxWidth: {{ style.cardWidth }}
        padding: 40
        entranceType: fade-in
        children:
          - type: body
            text: "{{ answer }}"
            fontSize: {{ style.answerSize }}
